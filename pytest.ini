[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Pure logic tests - no I/O, no system calls (fast)
    mock: Tests with mocked system calls (fast)
    integration: Real system tests - require sudo, slow, manual only
    requires_sudo: Tests requiring root privileges
    requires_chroot: Tests that execute commands via chroot/qemu
    requires_device: Tests that prefer real SD card (will fallback to loop device)
    slow: Tests that take significant time (>1s)

# Default: run unit and mock tests only (no integration)
addopts = -v -m "not integration"

# Show extra summary info
console_output_style = progress

# Timeout for hanging tests (requires pytest-timeout)
# timeout = 30
